<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mockup Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#0f0e0d;--ink2:#5a5751;--ink3:#9b9690;
  --surface:#faf9f7;--surface2:#f2f0ec;--surface3:#e8e5df;
  --border:#dedad3;--accent:#d4622a;
  --radius:10px;--sidebar:258px;
}
body{font-family:'DM Sans',sans-serif;background:#e8e5df;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.app{display:flex;height:680px;width:100%;max-width:1100px;background:var(--surface);border-radius:18px;overflow:hidden;border:1px solid var(--border);color:var(--ink);box-shadow:0 20px 60px rgba(0,0,0,0.12),0 4px 16px rgba(0,0,0,0.08);}

/* SIDEBAR */
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.logo-mark{width:30px;height:30px;background:var(--ink);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-mark i{font-size:16px;color:var(--surface);}
.logo-text{font-size:14px;font-weight:500;letter-spacing:-0.01em;}
.logo-sub{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace;margin-top:1px;}
.section{padding:13px 14px 11px;border-bottom:1px solid var(--border);}
.lbl{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:9px;font-family:'DM Mono',monospace;}

.url-wrap{display:flex;flex-direction:column;gap:6px;}
.input-row{display:flex;gap:5px;}
.url-input{flex:1;min-width:0;padding:8px 10px;font-size:12px;font-family:'DM Mono',monospace;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--ink);outline:none;transition:border-color 0.15s;}
.url-input:focus{border-color:var(--ink3);}
.url-input::placeholder{color:var(--ink3);}
.load-btn{padding:8px 13px;font-size:12px;font-weight:500;background:var(--ink);color:var(--surface);border:none;border-radius:7px;cursor:pointer;white-space:nowrap;transition:opacity 0.15s,transform 0.1s;font-family:'DM Sans',sans-serif;}
.load-btn:hover{opacity:0.82;}
.load-btn:active{transform:scale(0.97);}

.device-pills{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.dpill{padding:7px 8px;font-size:11.5px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--ink2);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all 0.12s;font-family:'DM Sans',sans-serif;}
.dpill i{font-size:14px;}
.dpill:hover{background:var(--surface2);color:var(--ink);}
.dpill.on{background:var(--ink);color:var(--surface);border-color:var(--ink);}

.swatches{display:flex;gap:7px;align-items:center;}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.1s,outline-color 0.1s;flex-shrink:0;outline:2px solid transparent;outline-offset:2px;}
.sw:hover{transform:scale(1.1);}
.sw.on{outline-color:var(--ink);}

.zoom-controls{display:flex;flex-direction:column;gap:7px;}
.zoom-row{display:flex;align-items:center;gap:6px;}
.zoom-label{font-size:11px;color:var(--ink2);min-width:54px;}
.zbtn-group{display:flex;gap:3px;margin-left:auto;}
.zbtn{width:26px;height:26px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--ink);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;line-height:1;transition:all 0.1s;}
.zbtn:hover{background:var(--surface3);}
.zbtn:active{transform:scale(0.95);}
.zbtn.display{width:40px;font-size:10px;cursor:default;pointer-events:none;}
.hint{font-size:10px;color:var(--ink3);font-family:'DM Mono',monospace;}

.cap-btn{margin:12px 14px;padding:11px;font-size:13px;font-weight:500;background:var(--accent);color:#fff;border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity 0.15s,transform 0.1s;font-family:'DM Sans',sans-serif;letter-spacing:-0.01em;}
.cap-btn:hover{opacity:0.88;}
.cap-btn:active{transform:scale(0.98);}
.cap-btn:disabled{opacity:0.4;pointer-events:none;}

/* VIEWPORT */
.viewport{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;transition:background 0.3s;}
.vp-warm{background:#f2f0ec;}
.vp-white{background:#ffffff;}
.vp-dark{background:#111110;}
.vp-slate{background:#1e2433;}
.vp-grad{background:linear-gradient(135deg,#f5e6d3 0%,#d4c4b0 100%);}

.device-outer{transform-origin:center center;transition:transform 0.2s cubic-bezier(0.34,1.2,0.64,1);}

/* device frames */
.phone-shell{width:252px;background:linear-gradient(160deg,#2a2a2a,#111);border-radius:46px;padding:13px;box-shadow:0 0 0 1px #3a3a3a,inset 0 0 0 1px rgba(255,255,255,0.07),0 50px 120px rgba(0,0,0,0.55),0 20px 40px rgba(0,0,0,0.3);position:relative;}
.phone-pill{position:absolute;top:0;left:50%;transform:translateX(-50%);width:82px;height:25px;background:#111;border-radius:0 0 14px 14px;z-index:3;}
.phone-screen{border-radius:34px;overflow:hidden;height:508px;background:#fff;position:relative;}

.tablet-shell{width:396px;background:linear-gradient(160deg,#2a2a2a,#111);border-radius:22px;padding:14px 11px;box-shadow:0 0 0 1px #3a3a3a,inset 0 0 0 1px rgba(255,255,255,0.07),0 50px 120px rgba(0,0,0,0.5);}
.tablet-screen{border-radius:9px;overflow:hidden;height:528px;background:#fff;}

.laptop-shell{width:514px;}
.laptop-lid{background:linear-gradient(160deg,#2d2d2d,#1a1a1a);border-radius:12px 12px 0 0;padding:10px 10px 5px;box-shadow:0 0 0 1px #3d3d3d;}
.laptop-screen{border-radius:4px;overflow:hidden;height:298px;background:#fff;}
.laptop-hinge{height:5px;background:linear-gradient(to bottom,#1a1a1a,#252525);box-shadow:0 0 0 1px #333;}
.laptop-base{height:14px;background:linear-gradient(to bottom,#333,#222);border-radius:0 0 4px 4px;box-shadow:0 0 0 1px #3a3a3a;}
.laptop-foot{height:3px;background:#111;border-radius:0 0 8px 8px;margin:0 24px;}

.desktop-shell{width:554px;}
.desktop-mon{background:linear-gradient(160deg,#2d2d2d,#1a1a1a);border-radius:12px;padding:10px;box-shadow:0 0 0 1px #3d3d3d;}
.desktop-screen{border-radius:4px;overflow:hidden;height:322px;background:#fff;}
.desktop-neck{width:48px;height:20px;background:#222;margin:0 auto;box-shadow:0 0 0 1px #333;}
.desktop-stand{width:150px;height:7px;background:#1e1e1e;border-radius:5px;margin:0 auto;box-shadow:0 0 0 1px #333;}

.scr{position:relative;}
.scr iframe{width:100%;height:100%;border:none;display:block;}
.scr .placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;background:var(--surface2);color:var(--ink3);font-size:12px;font-family:'DM Sans',sans-serif;}
.scr .placeholder i{font-size:30px;opacity:0.35;}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);padding:10px 20px;background:var(--ink);color:var(--surface);border-radius:20px;font-size:12.5px;font-family:'DM Sans',sans-serif;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;z-index:9999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-mark"><i class="ti ti-photo"></i></div>
      <div>
        <div class="logo-text">Mockup Studio</div>
        <div class="logo-sub">url → device → export</div>
      </div>
    </div>

    <div class="section">
      <div class="lbl">URL</div>
      <div class="url-wrap">
        <div class="input-row">
          <input class="url-input" id="urlInput" type="text" placeholder="https://…" spellcheck="false"/>
          <button class="load-btn" onclick="loadURL()">Load</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="lbl">Device</div>
      <div class="device-pills">
        <button class="dpill on" data-d="phone" onclick="setDevice('phone',this)"><i class="ti ti-device-mobile"></i>Phone</button>
        <button class="dpill" data-d="tablet" onclick="setDevice('tablet',this)"><i class="ti ti-device-tablet"></i>Tablet</button>
        <button class="dpill" data-d="laptop" onclick="setDevice('laptop',this)"><i class="ti ti-device-laptop"></i>Laptop</button>
        <button class="dpill" data-d="desktop" onclick="setDevice('desktop',this)"><i class="ti ti-device-desktop"></i>Desktop</button>
      </div>
    </div>

    <div class="section">
      <div class="lbl">Background</div>
      <div class="swatches">
        <div class="sw on" style="background:#f2f0ec;border:2px solid #dedad3;" onclick="setBg('vp-warm',this)" title="Warm"></div>
        <div class="sw" style="background:#fff;border:2px solid #ddd;" onclick="setBg('vp-white',this)" title="White"></div>
        <div class="sw" style="background:#111110;" onclick="setBg('vp-dark',this)" title="Dark"></div>
        <div class="sw" style="background:#1e2433;" onclick="setBg('vp-slate',this)" title="Slate"></div>
        <div class="sw" style="background:linear-gradient(135deg,#f5e6d3,#d4c4b0);" onclick="setBg('vp-grad',this)" title="Sand"></div>
      </div>
    </div>

    <div class="section">
      <div class="lbl">Frame zoom</div>
      <div class="zoom-controls">
        <div class="zoom-row">
          <span class="zoom-label">Scale</span>
          <div class="zbtn-group">
            <button class="zbtn" onclick="changeZoom(-0.05)" title="⌘−">−</button>
            <button class="zbtn display" id="zoomVal">75%</button>
            <button class="zbtn" onclick="changeZoom(0.05)" title="⌘+">+</button>
          </div>
        </div>
        <div class="hint">⌘− / ⌘+ or use buttons</div>
      </div>
    </div>

    <div class="section">
      <div class="lbl">Page scale</div>
      <div class="zoom-controls">
        <div class="zoom-row">
          <span class="zoom-label">Content</span>
          <div class="zbtn-group">
            <button class="zbtn" onclick="changePageScale(-0.1)">−</button>
            <button class="zbtn display" id="scaleVal">100%</button>
            <button class="zbtn" onclick="changePageScale(0.1)">+</button>
          </div>
        </div>
        <div class="hint">zooms content inside screen</div>
      </div>
    </div>

    <button class="cap-btn" id="capBtn" onclick="captureIt()">
      <i class="ti ti-camera"></i> Capture mockup
    </button>
  </div>

  <div class="viewport vp-warm" id="vp">
    <div class="device-outer" id="deviceOuter" style="transform:scale(0.75)">
      <div id="deviceFrame"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let device='phone', zoom=0.75, pageScale=1.0, url='', loaded=false;

const shells={
  phone:  c=>`<div class="phone-shell"><div class="phone-pill"></div><div class="phone-screen scr" id="scr">${c}</div></div>`,
  tablet: c=>`<div class="tablet-shell"><div class="tablet-screen scr" id="scr">${c}</div></div>`,
  laptop: c=>`<div class="laptop-shell"><div class="laptop-lid"><div class="laptop-screen scr" id="scr">${c}</div></div><div class="laptop-hinge"></div><div class="laptop-base"></div><div class="laptop-foot"></div></div>`,
  desktop:c=>`<div class="desktop-shell"><div class="desktop-mon"><div class="desktop-screen scr" id="scr">${c}</div></div><div class="desktop-neck"></div><div class="desktop-stand"></div></div>`,
};

function placeholder(){
  return `<div class="placeholder"><i class="ti ti-link"></i><span>Enter a URL to preview</span></div>`;
}

function iframeContent(){
  const scr=document.getElementById('scr');
  const w=scr?scr.offsetWidth:300, h=scr?scr.offsetHeight:500;
  return `<div style="width:100%;height:100%;overflow:hidden;">
    <div style="transform-origin:top left;transform:scale(${pageScale});width:${Math.round(w/pageScale)}px;height:${Math.round(h/pageScale)}px;">
      <iframe src="${url}" style="width:100%;height:100%;border:none;display:block;"></iframe>
    </div>
  </div>`;
}

function render(content){
  document.getElementById('deviceFrame').innerHTML=shells[device](content||placeholder());
}

function loadURL(){
  let raw=document.getElementById('urlInput').value.trim();
  if(!raw) return;
  if(!/^https?:\/\//i.test(raw)) raw='https://'+raw;
  url=raw; loaded=true;
  render(iframeContent());
}

function setDevice(d,el){
  device=d;
  document.querySelectorAll('.dpill').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render(loaded?iframeContent():null);
}

function setBg(cls,el){
  document.getElementById('vp').className='viewport '+cls;
  document.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));
  el.classList.add('on');
}

function changeZoom(delta){
  zoom=Math.min(1.5,Math.max(0.2,zoom+delta));
  document.getElementById('deviceOuter').style.transform=`scale(${zoom})`;
  document.getElementById('zoomVal').textContent=Math.round(zoom*100)+'%';
}

function changePageScale(delta){
  pageScale=Math.min(2.0,Math.max(0.3,pageScale+delta));
  document.getElementById('scaleVal').textContent=Math.round(pageScale*100)+'%';
  if(loaded) render(iframeContent());
}

document.addEventListener('keydown',e=>{
  if(e.metaKey||e.ctrlKey){
    if(e.key==='-'||e.key==='_'){e.preventDefault();changeZoom(-0.05);}
    if(e.key==='='||e.key==='+'){e.preventDefault();changeZoom(0.05);}
  }
});

// ── CAPTURE ──
// Running locally = no CORS restrictions.
// Strategy: set zoom to 1, hide iframes, use html2canvas on the shell,
// then re-render with an <img> snapshot of the iframe's canvas for the screen area.
async function captureIt(){
  if(!loaded||!url){showToast('Load a URL first');return;}
  const btn=document.getElementById('capBtn');
  btn.disabled=true;
  btn.innerHTML='<i class="ti ti-loader"></i> Capturing…';

  const outer=document.getElementById('deviceOuter');
  const frame=document.getElementById('deviceFrame').firstElementChild;
  const scrEl=frame?frame.querySelector('.scr'):null;

  const savedT=outer.style.transform;
  outer.style.transform='scale(1)';
  await tick(100);

  try{
    // Try reading iframe canvas (works locally since same-origin rules are relaxed for file://)
    const iframeEl=scrEl?scrEl.querySelector('iframe'):null;
    let iframeCanvas=null;

    if(iframeEl){
      try{
        const iDoc=iframeEl.contentDocument||iframeEl.contentWindow.document;
        if(iDoc&&iDoc.body){
          iframeCanvas=await html2canvas(iDoc.documentElement,{
            useCORS:true,allowTaint:true,scale:2,
            backgroundColor:'#ffffff',logging:false,
            width:iframeEl.offsetWidth,height:iframeEl.offsetHeight,
            windowWidth:iframeEl.offsetWidth,windowHeight:iframeEl.offsetHeight,
          });
        }
      }catch(e){console.warn('iframe read blocked:',e);}
    }

    // Capture the device shell (ignoring iframe)
    const shellCanvas=await html2canvas(frame,{
      useCORS:true,allowTaint:true,scale:2,
      backgroundColor:null,logging:false,
      ignoreElements:el=>el.tagName==='IFRAME',
    });

    // Build final canvas
    const pad=72;
    const fc=document.createElement('canvas');
    fc.width=shellCanvas.width+pad*2;
    fc.height=shellCanvas.height+pad*2;
    const ctx=fc.getContext('2d');

    // background
    const vp=document.getElementById('vp');
    if(vp.classList.contains('vp-grad')){
      const g=ctx.createLinearGradient(0,0,fc.width,fc.height);
      g.addColorStop(0,'#f5e6d3');g.addColorStop(1,'#d4c4b0');ctx.fillStyle=g;
    }else if(vp.classList.contains('vp-dark')){ctx.fillStyle='#111110';}
    else if(vp.classList.contains('vp-slate')){ctx.fillStyle='#1e2433';}
    else if(vp.classList.contains('vp-white')){ctx.fillStyle='#ffffff';}
    else{ctx.fillStyle='#f2f0ec';}
    ctx.fillRect(0,0,fc.width,fc.height);

    // device chrome
    ctx.drawImage(shellCanvas,pad,pad);

    // screen content
    if(iframeCanvas&&scrEl&&iframeEl){
      const sRect=scrEl.getBoundingClientRect();
      const fRect=frame.getBoundingClientRect();
      const sx=(sRect.left-fRect.left)*2+pad;
      const sy=(sRect.top-fRect.top)*2+pad;
      const sw=sRect.width*2;
      const sh=sRect.height*2;
      ctx.save();
      ctx.beginPath();
      // match border-radius of screen
      roundedRect(ctx,sx,sy,sw,sh,getScreenRadius()*2);
      ctx.clip();
      ctx.drawImage(iframeCanvas,0,0,iframeCanvas.width,iframeCanvas.height,sx,sy,sw,sh);
      ctx.restore();
    }

    outer.style.transform=savedT;
    download(fc,'mockup-'+device+'-'+Date.now()+'.png');
    showToast('Mockup saved!');
  }catch(err){
    outer.style.transform=savedT;
    console.error(err);
    showToast('Error: '+err.message);
  }

  btn.disabled=false;
  btn.innerHTML='<i class="ti ti-camera"></i> Capture mockup';
}

function getScreenRadius(){
  return device==='phone'?34:device==='tablet'?9:4;
}

function roundedRect(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function download(canvas,name){
  const a=document.createElement('a');
  a.download=name;a.href=canvas.toDataURL('image/png');a.click();
}

function tick(ms){return new Promise(r=>setTimeout(r,ms));}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

document.getElementById('urlInput').addEventListener('keydown',e=>{
  if(e.key==='Enter')loadURL();
});

render(null);
</script>
</body>
</html>
